    <script>
        const sheetCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTh3aquTDV5zBLhxHhzvn14PcpvHJYgYdpytgS7Z7GhSfzXcULgQEUZiW1stCQz-oFg_eWnABfo8CuH/pub?output=csv";
        let allProducts = [];
        let currentCategory = 'all';

        // Azərbaycan hərflərini sadə latın hərflərinə çevirir ki, axtarış oxşarlığa görə işləsin
        function normalizeText(str) {
            if (!str) return '';
            return str
                .toLowerCase()
                .replace(/ç/g, 'c')
                .replace(/ş/g, 's')
                .replace(/ə/g, 'e')
                .replace(/ğ/g, 'g')
                .replace(/ı/g, 'i')
                .replace(/ö/g, 'o')
                .replace(/ü/g, 'u');
        }

        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            const result = [];
            
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                const row = [];
                let insideQuote = false;
                let entries = "";
                
                for (let j = 0; j < line.length; j++) {
                    let char = line[j];
                    if (char === '"') {
                        insideQuote = !insideQuote;
                    } else if (char === ',' && !insideQuote) {
                        row.push(entries.trim());
                        entries = "";
                    } else {
                        entries += char;
                    }
                }
                row.push(entries.trim());
                
                if (row.length >= 4) {
                    let rawId = row[4] ? row[4].replace(/^"|"$/g, '').trim() : "";
                    let rawPrice = row[5] ? row[5].replace(/^"|"$/g, '').trim() : "";
                    
                    result.push({
                        name: row[0].replace(/^"|"$/g, '').trim(),
                        category: row[1].replace(/^"|"$/g, '').trim(),
                        link: row[2].replace(/^"|"$/g, '').trim(),
                        image: row[3].replace(/^"|"$/g, '').trim(),
                        id: rawId,
                        price: rawPrice
                    });
                }
            }
            return result;
        }

        async function loadProductsFromSheet() {
            const catalogGrid = document.getElementById('katalog');
            
            try {
                const response = await fetch(sheetCsvUrl + "&t=" + new Date().getTime());
                if (!response.ok) throw new Error('Məlumat bazasına qoşulmaq alınmadı');
                
                const csvText = await response.text();
                allProducts = parseCSV(csvText);
                
                catalogGrid.innerHTML = ''; 

                if (allProducts.length === 0) {
                    catalogGrid.innerHTML = '<div class="loading-text">Kataloq hazırda boşdur.</div>';
                    return;
                }

                allProducts.forEach((product, index) => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    
                    const normalizedSearch = normalizeText(`${product.name} ${product.id} ${product.category}`);
                    card.setAttribute('data-search', normalizedSearch);
                    card.setAttribute('data-category', product.category);

                    const idBadgeHtml = product.id ? `<div><span class="title-id-badge">Məhsul kodu: ${product.id}</span></div>` : '';
                    const priceHtml = product.price ? `<div class="product-price">${product.price} AZN</div>` : '';

                    card.innerHTML = `
                        <div>
                            <div class="product-img-box">
                                <img src="${product.image}" alt="${product.name}" onerror="this.src='https://placehold.co/400x400?text=Idrak'">
                            </div>
                            ${priceHtml}
                            <div class="product-category">${product.category}</div>
                            <div class="product-title">${product.name}</div>
                            ${idBadgeHtml}
                        </div>
                    `;
                    
                    card.onclick = function() {
                        showProductPage(index);
                    };
                    
                    catalogGrid.appendChild(card);
                });

                renderCategories();
                checkRoute();

            } catch (error) {
                console.error("Xəta:", error);
                catalogGrid.innerHTML = '<div class="loading-text" style="color: red;">Məlumatları yükləyərkən xəta baş verdi.</div>';
            }
        }

        function renderCategories() {
            const sidebar = document.getElementById('categorySidebar');
            const categories = [...new Set(allProducts.map(p => p.category).filter(Boolean))];

            sidebar.innerHTML = '<h3>Kateqoriyalar</h3>';

            const allItem = document.createElement('div');
            allItem.className = 'category-item active';
            allItem.textContent = 'Hamısı';
            allItem.onclick = function () { selectCategory('all', allItem); };
            sidebar.appendChild(allItem);

            categories.forEach(cat => {
                const item = document.createElement('div');
                item.className = 'category-item';
                item.textContent = cat;
                item.onclick = function () { selectCategory(cat, item); };
                sidebar.appendChild(item);
            });
        }

        function selectCategory(cat, el) {
            currentCategory = cat;
            document.querySelectorAll('.category-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            filterProducts();
        }

        function showProductPage(index) {
            const product = allProducts[index];
            if (!product) return;

            document.getElementById('singleImg').src = product.image;
            document.getElementById('singleImg').onerror = function() {
                this.src = 'https://placehold.co/400x400?text=Idrak';
            };
            document.getElementById('singleCategory').innerText = product.category;
            document.getElementById('singleTitle').innerText = product.name;
            
            const codeBadge = document.getElementById('singleCode');
            if(product.id) {
                codeBadge.innerText = `Məhsul kodu: ${product.id}`;
                codeBadge.style.display = 'inline-block';
            } else {
                codeBadge.style.display = 'none';
            }

            const phoneNumber = "994513933631";
            let messageText = `Salam, bu məhsulu sifariş etmək istəyirəm:\nMəhsul: ${product.name}`;
            if(product.id) {
                messageText += `\nMəhsul kodu: ${product.id}`;
            }
            
            // const whatsappUrl = `https://api.whatsapp.com/send?phone=${phoneNumber}&text=${encodeURIComponent(messageText)}`;
            // document.getElementById('whatsappLinkBtn').href = whatsappUrl;

            // Köhnə 'api.whatsapp.com' əvəzinə modern və sürətli 'wa.me' strukturundan istifadə edirik
            // const whatsappUrl = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(messageText)}`;
            // document.getElementById('whatsappLinkBtn').href = whatsappUrl;

            // İstifadəçinin mobil cihazda olub-olmadığını yoxlayırıq
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

            let whatsappUrl = '';

            if (isMobile) {
                // Mobil cihazlar üçün modern və sürətli 'wa.me'
                whatsappUrl = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(messageText)}`;
            } else {
                // Kompüterlər (Desktop) üçün birbaşa WhatsApp Web linki
                whatsappUrl = `https://web.whatsapp.com/send?phone=${phoneNumber}&text=${encodeURIComponent(messageText)}`;
            }

            document.getElementById('whatsappLinkBtn').href = whatsappUrl;

            document.getElementById('catalogView').classList.add('hidden');
            document.getElementById('productView').classList.remove('hidden');
            
            window.location.hash = `mehsul-${index}`;
            window.scrollTo(0, 0);
        }

        function showCatalog() {
            document.getElementById('productView').classList.add('hidden');
            document.getElementById('catalogView').classList.remove('hidden');
            history.pushState("", document.title, window.location.pathname + window.location.search);
        }

        function checkRoute() {
            const hash = window.location.hash;
            if (hash.startsWith('#mehsul-')) {
                const index = parseInt(hash.replace('#mehsul-', ''));
                if (!isNaN(index) && allProducts[index]) {
                    showProductPage(index);
                } else {
                    showCatalog();
                }
            } else {
                showCatalog();
            }
        }

        function filterProducts() {
            const query = normalizeText(document.getElementById('searchInput').value.trim());
            const tokens = query.split(/\s+/).filter(Boolean);
            const cards = document.querySelectorAll('.product-card');

            cards.forEach(card => {
                const searchContent = card.getAttribute('data-search');
                const cardCategory = card.getAttribute('data-category');

                const matchesCategory = currentCategory === 'all' || cardCategory === currentCategory;
                const matchesSearch = tokens.length === 0 || tokens.every(t => searchContent.includes(t));

                if (matchesCategory && matchesSearch) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });
        }

        window.addEventListener('DOMContentLoaded', loadProductsFromSheet);
        window.addEventListener('hashchange', checkRoute);
    </script>

</body>
</html>
